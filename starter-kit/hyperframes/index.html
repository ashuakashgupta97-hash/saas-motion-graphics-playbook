<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="launch-patterns.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="launch-patterns.js"></script>
    <style>
      html, body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: #071822;
      }

      #root {
        width: 1920px;
        height: 1080px;
      }

      .demo-note {
        position: absolute;
        left: 32px;
        bottom: 28px;
        z-index: 10;
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        background: rgba(7, 24, 34, 0.72);
        color: rgba(255, 255, 255, 0.74);
        font: 14px/1.4 "IBM Plex Sans", "Segoe UI", sans-serif;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="demo-note">Minimal demo scene for the reusable launch-pattern starter.</div>
    <script>
      const root = document.getElementById("root");
      LaunchVideoPatterns.mountDecisionConstellation(root, {
        title: "Behind every workflow is a decision",
        leftTitle: "Multiple checks",
        leftGhost: "before approval",
      });

      const tl = gsap.timeline();
      LaunchVideoPatterns.animateDecisionConstellation(tl, root, 0);
    </script>
  </body>
</html>
